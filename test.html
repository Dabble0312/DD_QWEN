<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | DojiDash</title>
    
    <link rel="stylesheet" href="premium-tokens.css">
    
    <style>
        /* ── COMPONENT STYLES (Layout & Specifics) ── */
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── TOP NAV (Unified) ── */
        .top-nav {
            height: var(--header-height);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 var(--space-10);
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
        }

        .nav-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: var(--space-4);
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            color: var(--text-tertiary);
        }

        .nav-user strong { color: var(--text-primary); font-weight: var(--font-bold); }

        .logout-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: var(--text-xs);
            font-weight: var(--font-bold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: var(--space-2) var(--space-4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            transition: all var(--transition-base) ease;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
        }

        .logout-link:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: var(--accent-glow);
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-10) var(--space-5);
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            padding: var(--space-10);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--border-subtle);
            box-shadow: 
                var(--shadow-xl),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: fadeInUp var(--transition-smooth);
        }

        /* HUD & Progress */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-2);
        }

        .progress-label {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            font-weight: var(--font-semibold);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .streak-badge {
            font-size: var(--text-xs);
            font-weight: var(--font-bold);
            color: var(--accent-warning);
            background: rgba(245, 158, 11, 0.1);
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .progress-bar-wrap {
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            height: 4px;
            margin-bottom: var(--space-4);
        }

        .progress-bar {
            height: 4px;
            border-radius: var(--radius-full);
            background: var(--accent-primary);
            transition: width 0.3s;
        }

        /* Badges */
        .badges-row {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
            flex-wrap: wrap;
        }

        .unit-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: var(--font-semibold);
            letter-spacing: 0.08em;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        /* Role-Based Interaction Badges */
        .type-label {
            font-size: 10px;
            font-weight: var(--font-bold);
            letter-spacing: 0.12em;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .type-lesson {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-primary);
            border-color: var(--border-accent);
        }

        .type-discovery {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .type-contrast {
            background: rgba(192, 132, 252, 0.1);
            color: #c084fc;
            border-color: rgba(192, 132, 252, 0.2);
        }

        .type-decision {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .type-challenge {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-warning);
            border-color: rgba(245, 158, 11, 0.2);
        }

        /* Content */
        h3 {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            line-height: 1.5;
            margin-bottom: var(--space-5);
            color: var(--text-primary);
        }

        .lesson-box {
            background: var(--bg-tertiary);
            border-left: 4px solid var(--accent-primary);
            padding: var(--space-5);
            border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
            margin-bottom: var(--space-6);
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* Options */
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 14px var(--space-5);
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: 15px;
            margin-bottom: var(--space-3);
            transition: all var(--transition-smooth);
            font-weight: var(--font-medium);
        }

        .option-btn:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .option-btn.selected {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .option-btn.correct {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-success);
            color: var(--accent-success);
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--accent-danger);
            color: var(--accent-danger);
            opacity: 0.8;
        }

        .option-btn:disabled {
            cursor: default;
        }

        /* Feedback */
        .feedback {
            margin-top: var(--space-4);
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            line-height: 1.6;
            animation: fadeIn var(--transition-fast);
        }

        .feedback.correct {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--accent-success);
        }

        .feedback.wrong {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--accent-danger);
        }

        /* Buttons */
        .continue-btn {
            margin-top: var(--space-4);
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            border: none;
            color: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            transition: all var(--transition-fast);
        }

        .continue-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: var(--shadow-glow);
        }

        .retry-btn {
            width: 100%;
            padding: 14px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--accent-info);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            transition: all var(--transition-fast);
        }

        .retry-btn:hover {
            background: rgba(6, 182, 212, 0.15);
        }

        /* Complete Screen */
        .complete-icon {
            font-size: var(--space-10);
            color: var(--accent-success);
            margin-bottom: var(--space-3);
            text-shadow: var(--shadow-glow-success);
        }

        .complete-title {
            font-size: var(--text-2xl);
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-3);
            color: var(--text-primary);
        }

        .complete-sub {
            color: var(--text-tertiary);
            font-size: var(--text-base);
            line-height: 1.6;
            margin-bottom: var(--space-6);
        }

        .stat-row {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }

        .stat {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: var(--space-4) var(--space-3);
            text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .stat-num {
            font-size: 26px;
            font-weight: var(--font-semibold);
            margin-bottom: 4px;
            color: var(--accent-primary);
        }

        .stat-lbl {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: var(--font-semibold);
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="nav-user">
            <span id="userGreeting">Welcome, <strong id="currentUsername">...</strong></span>
            <div style="display:flex; gap: 12px;">
                <button onclick="window.location.href='index.html'" class="logout-link" style="border-color: rgba(255,255,255,0.2);">← Dashboard</button>
                <button id="logoutBtn" class="logout-link">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card" id="app"></div>
    </div>

    <script src="test.js"></script>
</body>
</html>
