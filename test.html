<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | DojiDash</title>
    
    <!-- Premium Design System -->
    <link rel="stylesheet" href="premium-tokens.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* ── TOP NAV (Unified) ── */
        .top-nav {
            height: 72px;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-tertiary);
        }

        .nav-user strong { color: var(--text-primary); font-weight: 700; }

        .logout-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 8px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
        }

        .logout-link:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            box-shadow: 
                0 4px 24px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* HUD & Progress */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .streak-badge {
            font-size: 11px;
            font-weight: 700;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .progress-bar-wrap {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            height: 4px;
            margin-bottom: 16px;
        }

        .progress-bar {
            height: 4px;
            border-radius: 4px;
            background: var(--accent-primary);
            transition: width 0.3s;
        }

        /* Badges */
        .badges-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .unit-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        /* Role-Based Interaction Badges */
        .type-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .type-lesson {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.2);
        }

        .type-discovery {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.2);
        }

        .type-contrast {
            background: rgba(192, 132, 252, 0.1);
            color: #c084fc;
            border-color: rgba(192, 132, 252, 0.2);
        }

        .type-decision {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.2);
        }

        .type-challenge {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
        }

        /* Content */
        h3 {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .lesson-box {
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--accent-primary);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 24px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* Options */
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            margin-bottom: 12px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.06);
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .option-btn.correct {
            background: rgba(34, 197, 94, 0.1);
            border-color: #10b981;
            color: #4ade80;
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #f87171;
            opacity: 0.8;
        }

        .option-btn:disabled {
            cursor: default;
        }

        /* Feedback */
        .feedback {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        .feedback.correct {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .feedback.wrong {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Buttons */
        .continue-btn {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .continue-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .retry-btn {
            width: 100%;
            padding: 14px;
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            color: #60a5fa;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s;
        }

        .retry-btn:hover {
            background: rgba(96, 165, 250, 0.15);
        }

        /* Complete Screen */
        .complete-icon {
            font-size: 40px;
            color: #4ade80;
            margin-bottom: 12px;
        }

        .complete-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .complete-sub {
            color: var(--text-tertiary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .stat-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .stat-num {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent-primary);
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <nav class="top-nav">
        <div class="nav-user">
            <span id="userGreeting">Welcome, <strong id="currentUsername">...</strong></span>
            <div style="display:flex; gap: 12px;">
                <button onclick="window.location.href='index.html'" class="logout-link" style="border-color: rgba(255,255,255,0.2);">← Dashboard</button>
                <button id="logoutBtn" class="logout-link">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card" id="app"></div>
    </div>

    <script src="test.js"></script>
</body>

</html>
