<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to DojiDash — build your trading intuition.">
    <title>Login | DojiDash</title>
    <link rel="icon" href="assets/images/Logo.gif" type="image/gif">
    
    <!-- Premium Design System -->
    <link rel="stylesheet" href="premium-tokens.css">
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Login Page - Premium Dark Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: grid;
            grid-template-columns: 4fr 6fr;
            overflow: hidden;
        }

        /* ── Left Side (40%) - Creative Trading Atmosphere ── */
        .login-left {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-right: 1px solid var(--border-subtle);
        }

        /* Animated grid background */
        .login-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating orbs for depth */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
            top: -50px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.25) 0%, transparent 70%);
            bottom: -50px;
            right: -80px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -30px) scale(1.05); }
            50% { transform: translate(-15px, 20px) scale(0.95); }
            75% { transform: translate(25px, 15px) scale(1.02); }
        }

        /* Candlestick decorations */
        .candlestick-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 5;
            opacity: 0.6;
        }

        .candlestick {
            width: 8px;
            border-radius: 2px;
            animation: candleGlow 3s ease-in-out infinite;
        }

        .candlestick.bullish {
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .candlestick.bearish {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .candlestick:nth-child(1) { height: 60px; animation-delay: 0s; }
        .candlestick:nth-child(2) { height: 40px; animation-delay: -0.5s; }
        .candlestick:nth-child(3) { height: 80px; animation-delay: -1s; }
        .candlestick:nth-child(4) { height: 50px; animation-delay: -1.5s; }
        .candlestick:nth-child(5) { height: 70px; animation-delay: -2s; }

        @keyframes candleGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .brand-logo {
            width: 320px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.5)) 
                    drop-shadow(0 0 80px rgba(99, 102, 241, 0.3));
            animation: logoIn 1.4s cubic-bezier(0.16, 1, 0.3, 1), 
                       logoPulse 4s ease-in-out infinite 1.4s;
        }

        @keyframes logoIn {
            from { 
                opacity: 0; 
                transform: scale(0.85) translateY(30px) rotate(-5deg); 
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0) rotate(0); 
            }
        }

        @keyframes logoPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.5)) 
                        drop-shadow(0 0 80px rgba(99, 102, 241, 0.3));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 60px rgba(99, 102, 241, 0.7)) 
                        drop-shadow(0 0 120px rgba(99, 102, 241, 0.4));
                transform: scale(1.03);
            }
        }

        .tagline {
            margin-top: 40px;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .tagline h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .tagline p {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Right Side (60%) ── */
        .login-right {
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* Subtle decorative elements on right side */
        .login-right::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(24px);
            padding: 48px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 4px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 15px;
            color: var(--text-tertiary);
        }

        /* ── Form Items ── */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(39, 39, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .form-input:focus {
            background: rgba(39, 39, 42, 0.9);
            border-color: var(--accent-primary);
            box-shadow: 
                0 0 0 3px rgba(99, 102, 241, 0.15),
                0 4px 12px rgba(99, 102, 241, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 
                0 4px 16px rgba(99, 102, 241, 0.35),
                0 0 0 0 rgba(99, 102, 241, 0);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 24px rgba(99, 102, 241, 0.45),
                0 0 20px rgba(99, 102, 241, 0.2);
            filter: brightness(1.08);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .login-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .login-footer a:hover {
            text-decoration: underline;
            color: #818cf8;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: 320px 1fr;
            }

            .login-left {
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
            }

            .brand-logo {
                width: 200px;
            }

            .tagline h2 {
                font-size: 18px;
            }

            .tagline p {
                font-size: 13px;
            }

            .candlestick-container {
                display: none;
            }

            .login-right {
                padding: 24px;
            }

            .login-card {
                padding: 32px;
                box-shadow: none;
                background: transparent;
                border: none;
                backdrop-filter: none;
            }
        }
    </style>
</head>
<body>

    <!-- Left Section: Brand & Atmosphere -->
    <aside class="login-left">
        <!-- Floating Orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        
        <!-- Brand Logo -->
        <img src="assets/images/Logo.gif" alt="DojiDash Logo" class="brand-logo">
        
        <!-- Tagline -->
        <div class="tagline">
            <h2>Master Your Trading Intuition</h2>
            <p>Learn. Practice. Conquer the Markets.</p>
        </div>
        
        <!-- Animated Candlesticks -->
        <div class="candlestick-container">
            <div class="candlestick bullish"></div>
            <div class="candlestick bearish"></div>
            <div class="candlestick bullish"></div>
            <div class="candlestick bearish"></div>
            <div class="candlestick bullish"></div>
        </div>
    </aside>

    <!-- Right Section: Login Interaction -->
    <main class="login-right">
        <div class="login-card">
            <header class="login-header">
                <h1>Welcome back</h1>
                <p>Enter your name to start your training session.</p>
            </header>

            <form id="loginForm">
                <div class="form-group">
                    <label for="usernameInput">Username</label>
                    <input 
                        type="text" 
                        id="usernameInput" 
                        class="form-input" 
                        placeholder="e.g. DiamondHands" 
                        required 
                        autocomplete="off"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="passwordInput">Password (Optional / Demo)</label>
                    <input 
                        type="password" 
                        id="passwordInput" 
                        class="form-input" 
                        placeholder="••••••••" 
                        disabled
                    >
                    <p style="font-size: 11px; color: var(--text-tertiary); margin-top: 6px;">Fake login for demo purposes. Password is not required.</p>
                </div>

                <button type="submit" class="login-btn">
                    Secure Entry
                </button>
            </form>

            <footer class="login-footer">
                <p>New to the Dojo? <a href="#">Learn about our mission</a></p>
            </footer>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('usernameInput').value.trim();
            
            if (username.length === 0) {
                alert("Please enter a username to proceed.");
                return;
            }

            // Save to LocalStorage so shared/ui.js and other components can access it
            localStorage.setItem("username", username);
            
            console.log("Logged in as:", username);
            
            // Redirect to the existing dashboard
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
